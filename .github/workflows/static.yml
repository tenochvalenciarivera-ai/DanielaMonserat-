    <h1>Efectos secundarios irreversibles por el consumo de cristal</h1>
    <p>Preparatoria No. 130, Tenango del Aire</p>
    <p>Alumna: Daniela Monserat</p>
    <p style="color:#ffcccc;">⚠️ Tema de concientización sobre salud y adicciones</p>
</header>

<nav>
    <a href="#concepto">Concepto</a>
