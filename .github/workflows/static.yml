<div class="container">

    <section id="concepto">
        <h2>Conceptualización</h2>
        <p>
            El cristal, también conocido como metanfetamina, es una droga sintética altamente adictiva
            que afecta el sistema nervioso central. Su consumo puede provocar daños irreversibles en el cerebro,
            alteraciones emocionales y deterioro físico severo (NIDA, 2020).
        </p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Methamphetamine.jpg">
    </section>

    <section id="historia">
        <h2>Antecedentes históricos</h2>
        <p>
            La metanfetamina fue desarrollada en el siglo XX con fines médicos, pero durante la Segunda Guerra Mundial
            se utilizó para aumentar la resistencia de los soldados. Con el tiempo, su uso se volvió ilegal debido a sus efectos dañinos (UNODC, 2021).
        </p>
    </section>

    <section id="objetivos">
        <h2>Objetivo general</h2>
        <p>
            Analizar los efectos secundarios irreversibles del consumo de cristal en la salud humana.
        </p>

        <h3>Objetivos específicos</h3>
        <ul>
            <li>Identificar los daños neurológicos.</li>
            <li>Describir consecuencias físicas permanentes.</li>
            <li>Concientizar a los jóvenes sobre los riesgos.</li>
        </ul>
    </section>

    <section id="clasificacion">
        <h2>Clasificación del tema</h2>
        <p>
            Este tema pertenece al área de salud, específicamente en adicciones y salud pública.
        </p>
    </section>

    <section id="ventajas">
        <h2>Ventajas (aparentes)</h2>
        <ul>
            <li>Euforia momentánea.</li>
            <li>Aumento de energía.</li>
            <li>Mayor estado de alerta.</li>
        </ul>
    </section>

    <section id="desventajas">
        <h2>Desventajas (reales)</h2>
        <ul>
            <li>Daño cerebral irreversible.</li>
            <li>Pérdida de memoria.</li>
            <li>Deterioro físico severo.</li>
            <li>Adicción extrema.</li>
            <li>Problemas cardíacos graves.</li>
        </ul>
        <img src="cerebro.jpg" alt="Daño cerebral por consumo de cristal">
    </section>

    <section id="conclusion">
        <h2>Conclusión</h2>
        <p>
            En mi opinión, el consumo de cristal representa un grave problema social y de salud.
            Aunque puede parecer atractivo, las consecuencias son permanentes y pueden afectar toda la vida.
        </p>
    </section>

